name: simulations

# Runs the metadid-sims targets pipeline once a day, but only if the
# upstream `ben18785/metadid` repo has a new commit on `main` since the
# last successful run. Each scenario category (A–H) runs in parallel as a
# separate matrix job; a final job merges their `_targets/` stores and
# renders the Quarto validation report.
#
# Trigger manually from the Actions tab and tick "force" to re-run against
# the current metadid HEAD even if nothing has changed.

on:
  schedule:
    # 03:17 UTC daily (off-peak; the random minute reduces queue contention)
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Run even if metadid main has not changed since last run"
        type: boolean
        default: false

# Don't run two of these concurrently — they'd fight over the same cache key.
concurrency:
  group: simulations
  cancel-in-progress: false

permissions:
  # `contents: write` is required to push the rendered report to the
  # `gh-pages` branch, which is the archive of all past runs.
  contents: write

# Defensive knobs against the intermittent pak/pkgcache download flake
# where a package shows as downloaded but is missing at install time.
# pkgcache uses these env vars to retry HTTP requests on failure.
env:
  PKGCACHE_HTTP_RETRIES: "5"
  PKGCACHE_HTTP_DELAY: "3"

jobs:

  # ---------------------------------------------------------------------------
  # check: ask GitHub for the metadid main HEAD SHA and decide whether to run
  # ---------------------------------------------------------------------------
  check:
    name: Check for new metadid commit
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.decide.outputs.run }}
      metadid_sha: ${{ steps.fetch.outputs.sha }}
    steps:
      - name: Fetch latest metadid main SHA
        id: fetch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sha=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/ben18785/metadid/commits/main \
            | jq -r '.sha')
          if [ -z "$sha" ] || [ "$sha" = "null" ]; then
            echo "::error::Could not fetch metadid main SHA"
            exit 1
          fi
          echo "metadid main SHA: $sha"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Look up last-run marker for this SHA
        id: cache_restore
        uses: actions/cache/restore@v4
        with:
          path: marker
          key: metadid-last-run-v1-${{ steps.fetch.outputs.sha }}

      - name: Decide whether to run
        id: decide
        env:
          FORCE: ${{ inputs.force }}
          HIT: ${{ steps.cache_restore.outputs.cache-hit }}
        run: |
          set -euo pipefail
          if [ "${FORCE:-false}" = "true" ]; then
            echo "Force-run requested via workflow_dispatch"
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "${HIT:-false}" = "true" ]; then
            echo "metadid main has not changed since the last successful run; skipping"
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "New metadid commit detected; running pipeline"
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # simulate: one parallel matrix job per scenario category
  # ---------------------------------------------------------------------------
  simulate:
    name: "Category ${{ matrix.category }}"
    needs: check
    if: needs.check.outputs.run == 'true'
    runs-on: ubuntu-latest
    # GitHub Actions hard-caps a single job at 6h on Linux runners. If a
    # category overruns this we'd need to subdivide the matrix further
    # (e.g. one job per scenario).
    timeout-minutes: 350
    strategy:
      fail-fast: false
      matrix:
        category: [A, B, C, D, E, F, G, H]
    env:
      METADID_SHA: ${{ needs.check.outputs.metadid_sha }}
    steps:
      - name: Checkout metadid-sims
        uses: actions/checkout@v4
        with:
          path: metadid-sims

      - name: Checkout metadid (pinned to current main)
        uses: actions/checkout@v4
        with:
          repository: ben18785/metadid
          ref: ${{ needs.check.outputs.metadid_sha }}
          path: metadid

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          extra-repositories: "https://mc-stan.org/r-packages/"

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: metadid
          cache-version: 2
          extra-packages: |
            any::cmdstanr
            any::instantiate
            any::targets
            any::tarchetypes
            any::MASS
            any::mvtnorm
            any::scales
            any::readr
            any::dplyr
            any::tidyr
            any::ggplot2
            any::purrr
            any::rlang
            any::tibble
            any::stringr
            any::tidyselect
            any::gridExtra
            any::forcats
            any::kableExtra
            any::knitr
            any::quarto

      - name: Cache CmdStan
        id: cmdstan-cache
        uses: actions/cache@v4
        with:
          path: ~/.cmdstan
          key: cmdstan-${{ runner.os }}-v1

      - name: Install CmdStan
        if: steps.cmdstan-cache.outputs.cache-hit != 'true'
        run: Rscript -e 'cmdstanr::install_cmdstan(cores = 2)'

      - name: Install metadid from local checkout
        run: R CMD INSTALL ./metadid

      - name: Run targets for category ${{ matrix.category }}
        working-directory: metadid-sims
        run: |
          Rscript -e '
            library(targets)
            tar_make(
              names = tidyselect::starts_with("${{ matrix.category }}_")
            )
          '

      - name: Upload _targets store slice
        uses: actions/upload-artifact@v4
        with:
          name: targets-store-${{ matrix.category }}
          path: |
            metadid-sims/_targets/meta/
            metadid-sims/_targets/objects/
          if-no-files-found: error
          retention-days: 14

  # ---------------------------------------------------------------------------
  # report: merge per-category stores, render the Quarto validation report
  # ---------------------------------------------------------------------------
  report:
    name: Render validation report
    needs: [check, simulate]
    if: needs.check.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      METADID_SHA: ${{ needs.check.outputs.metadid_sha }}
    steps:
      - name: Checkout metadid-sims
        uses: actions/checkout@v4
        with:
          path: metadid-sims

      - name: Checkout metadid
        uses: actions/checkout@v4
        with:
          repository: ben18785/metadid
          ref: ${{ needs.check.outputs.metadid_sha }}
          path: metadid

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          extra-repositories: "https://mc-stan.org/r-packages/"

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: metadid
          cache-version: 2
          extra-packages: |
            any::cmdstanr
            any::instantiate
            any::targets
            any::tarchetypes
            any::MASS
            any::mvtnorm
            any::scales
            any::readr
            any::dplyr
            any::tidyr
            any::ggplot2
            any::purrr
            any::rlang
            any::tibble
            any::stringr
            any::tidyselect
            any::gridExtra
            any::forcats
            any::quarto
            any::knitr
            any::kableExtra
            any::rmarkdown

      - name: Cache CmdStan
        id: cmdstan-cache
        uses: actions/cache@v4
        with:
          path: ~/.cmdstan
          key: cmdstan-${{ runner.os }}-v1

      - name: Install CmdStan
        if: steps.cmdstan-cache.outputs.cache-hit != 'true'
        run: Rscript -e 'cmdstanr::install_cmdstan(cores = 2)'

      - name: Install metadid from local checkout
        run: R CMD INSTALL ./metadid

      - name: Restore prior archive.csv from gh-pages (if present)
        working-directory: metadid-sims
        run: |
          set -euo pipefail
          mkdir -p output
          # The `archive_results` target in _targets.R appends to this file
          # if it exists; otherwise it starts fresh. Pull the previous run's
          # copy so the cross-run history accumulates.
          url="https://raw.githubusercontent.com/${{ github.repository }}/gh-pages/archive.csv"
          if curl -fsSL -o output/archive.csv "$url"; then
            echo "Restored prior archive.csv ($(wc -l < output/archive.csv) lines incl. header)"
          else
            echo "No prior archive.csv on gh-pages; starting fresh"
            rm -f output/archive.csv
          fi

      - name: Download all _targets store slices
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: targets-store-*

      - name: Merge _targets stores
        working-directory: metadid-sims
        run: |
          set -euo pipefail
          mkdir -p _targets/meta _targets/objects
          # Copy every category's object files (target names are unique per
          # category, so cross-category collisions only happen on shared
          # dependencies like `metadid_src`, which all carry the same hash).
          for d in ../artifacts/targets-store-*; do
            if [ -d "$d/objects" ]; then
              cp -rn "$d"/objects/. _targets/objects/ || true
            fi
          done
          # Merge meta files: keep one header line, then dedupe rows by
          # the first column (target name).
          first=$(ls -1 ../artifacts/targets-store-*/meta/meta 2>/dev/null | head -1)
          if [ -z "$first" ]; then
            echo "::error::No meta files found in downloaded artifacts"
            exit 1
          fi
          head -n 1 "$first" > _targets/meta/meta
          for f in ../artifacts/targets-store-*/meta/meta; do
            tail -n +2 "$f"
          done | awk -F'|' '!seen[$1]++' >> _targets/meta/meta
          echo "Merged store contains $(wc -l < _targets/meta/meta) meta rows and $(ls _targets/objects | wc -l) object files."

      - name: Build cross-category targets and render report
        working-directory: metadid-sims
        run: |
          Rscript -e '
            library(targets)
            tar_make(names = c(
              "scenario_lookup_tbl",
              "diag_plot_A", "diag_plot_B", "diag_plot_C", "diag_plot_D",
              "diag_plot_E", "diag_plot_F", "diag_plot_G", "diag_plot_H",
              "all_agg", "all_rep",
              "export_agg_csv", "export_rep_rds", "archive_results",
              "report"
            ))
          '

      - name: Upload validation report and outputs
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: |
            metadid-sims/reports/validation-report.html
            metadid-sims/output/aggregated_results.csv
            metadid-sims/output/replication_results.rds
            metadid-sims/output/archive.csv
          if-no-files-found: warn
          retention-days: 90

      - name: Checkout existing gh-pages branch (if it exists)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-current
        continue-on-error: true

      - name: Build cumulative site
        env:
          METADID_SHA: ${{ needs.check.outputs.metadid_sha }}
        run: |
          set -euo pipefail

          SHORT_SHA="${METADID_SHA:0:7}"
          DATE="$(date -u +%Y-%m-%d)"
          NEW_DIR="${DATE}-${SHORT_SHA}"

          # --- New per-run archive entry ---
          mkdir -p "public/archive/${NEW_DIR}"
          cp metadid-sims/reports/validation-report.html  "public/archive/${NEW_DIR}/index.html"
          cp metadid-sims/output/aggregated_results.csv   "public/archive/${NEW_DIR}/" 2>/dev/null || true
          cp metadid-sims/output/replication_results.rds  "public/archive/${NEW_DIR}/" 2>/dev/null || true

          # --- "latest/" always points at the newest report ---
          mkdir -p public/latest
          cp metadid-sims/reports/validation-report.html  public/latest/index.html
          cp metadid-sims/output/aggregated_results.csv   public/latest/ 2>/dev/null || true
          cp metadid-sims/output/replication_results.rds  public/latest/ 2>/dev/null || true

          # --- Cumulative archive.csv lives at the site root ---
          cp metadid-sims/output/archive.csv  public/archive.csv 2>/dev/null || true

          # --- Build root index.html listing every archive entry ---
          {
            existing=""
            if [ -d gh-pages-current/archive ]; then
              existing=$(ls -1 gh-pages-current/archive 2>/dev/null || true)
            fi
            echo "$existing"
            echo "${NEW_DIR}"
          } | sed '/^$/d' | sort -u -r > archive_list.txt

          cat > public/index.html <<'HTML_HEAD'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>metadid-sims validation reports</title>
            <style>
              body{font-family:system-ui,-apple-system,sans-serif;max-width:780px;margin:2rem auto;padding:0 1rem;color:#24292f;line-height:1.5}
              h1{margin-bottom:.2rem}
              .subtitle{color:#57606a;margin-top:0}
              .latest{background:#ddf4ff;border:1px solid #54aeff66;border-radius:6px;padding:.75rem 1rem;margin:1.5rem 0}
              .latest a{font-weight:600}
              table{width:100%;border-collapse:collapse;margin-top:1rem}
              th,td{padding:.5rem .75rem;border-bottom:1px solid #eaeef2;text-align:left}
              th{background:#f6f8fa;font-weight:600}
              a{color:#0969da;text-decoration:none}
              a:hover{text-decoration:underline}
              code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.9em;background:#f6f8fa;padding:.1em .35em;border-radius:3px}
            </style>
          </head>
          <body>
            <h1>metadid validation reports</h1>
            <p class="subtitle">Daily simulation runs against each new commit on metadid:main.</p>
            <div class="latest"><a href="latest/">→ Latest report</a> &middot; <a href="archive.csv">cumulative aggregated CSV</a></div>
            <h2>Archive</h2>
            <table>
              <thead><tr><th>Date</th><th>metadid commit</th><th>Report</th><th>Aggregated CSV</th></tr></thead>
              <tbody>
          HTML_HEAD

          while IFS= read -r d; do
            [ -z "$d" ] && continue
            date_part="${d:0:10}"
            sha_part="${d:11}"
            cat >> public/index.html <<HTML_ROW
              <tr>
                <td>${date_part}</td>
                <td><a href="https://github.com/ben18785/metadid/commit/${sha_part}"><code>${sha_part}</code></a></td>
                <td><a href="archive/${d}/">HTML</a></td>
                <td><a href="archive/${d}/aggregated_results.csv">CSV</a></td>
              </tr>
          HTML_ROW
          done < archive_list.txt

          cat >> public/index.html <<'HTML_FOOT'
              </tbody>
            </table>
          </body>
          </html>
          HTML_FOOT

          touch public/.nojekyll
          echo "Built site with $(wc -l < archive_list.txt) archive entries"

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./public
          # keep_files: true preserves every past archive/ entry on the
          # branch; we only ship the new run's directory plus the
          # regenerated root index and latest/.
          keep_files: true
          commit_message: "Publish validation report for metadid@${{ needs.check.outputs.metadid_sha }}"
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"

      - name: Write last-run marker
        run: |
          mkdir -p marker
          echo "${METADID_SHA}" > marker/last-metadid-sha

      - name: Save last-run marker (so we don't re-run this SHA tomorrow)
        uses: actions/cache/save@v4
        with:
          path: marker
          key: metadid-last-run-v1-${{ env.METADID_SHA }}
